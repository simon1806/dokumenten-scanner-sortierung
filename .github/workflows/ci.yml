name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests und statische Prüfung
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-build.lock
            requirements-build.txt
            constraints-build.txt

      - name: Fixierte Abhängigkeiten installieren
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install `
            --require-hashes `
            --only-binary=:all: `
            --requirement requirements-build.lock
          .\.venv\Scripts\python.exe -m pip install `
            --no-deps `
            --no-build-isolation `
            --editable .

      - name: Abhängigkeiten prüfen
        run: .\.venv\Scripts\python.exe -m pip check

      - name: Ruff ausführen
        run: .\.venv\Scripts\ruff.exe check --no-cache src installer scripts tests

      - name: Unit- und Integrationstests ausführen
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: .\.venv\Scripts\python.exe -m unittest discover -s tests -v

  build:
    name: Windows-Release bauen
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-build.lock
            requirements-build.txt
            constraints-build.txt

      - name: Fixierte Abhängigkeiten installieren
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install `
            --require-hashes `
            --only-binary=:all: `
            --requirement requirements-build.lock
          .\.venv\Scripts\python.exe -m pip install `
            --no-deps `
            --no-build-isolation `
            --editable .

      - name: OCR-Paket mit geprüften Hashes vorbereiten
        shell: powershell
        run: .\scripts\prepare-tesseract-vendor.ps1

      - name: Release nach erfolgreichen Tests bauen
        shell: powershell
        run: .\scripts\build-release.ps1 -Version 0.1.24

      - name: Release-Artefakte veröffentlichen
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: DokumentenScannerSortierung-0.1.24
          path: release/0.1.24/*
          if-no-files-found: error
          retention-days: 14
